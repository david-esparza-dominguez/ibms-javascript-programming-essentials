<!DOCTYPE html>
<html lang="en-US">
<head>
    <title> Travel Wanderly </title>
    <link rel="stylesheet" href="./travel_recommendation.css" />
</head>
<body>
    <nav class="navbar">
        <div class="logo">Travel Wanderly</div>
        <ul class="nav-links">
            <li>
                <a href="./travel_recommendation.html" id="home">
                    Home
                </a>
            </li> 
            <li>
                <a href="./about.html" id="about">
                    About us
                </a>
            </li>
            <li>
                <a href="./contact.html" id="contact">
                    Contact us
                </a>
            </li>
        </ul>
        <div class="search-container">
            <input
                type="text"
                id="travelSearchInput"
                placeholder="Enter a destination or keyword"
            />
            <span class="search-icon">🔍</span>
            <button id="btnSearch" class="search-btn">
                Search
            </button>
            <button id="btnClear" class="clear-btn">
                Clear
            </button>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>DISCOVER YOUR NEXT ADVENTURE</h1>
            <p>Personalized travel recommendations for unforgettable experiences.</p>
            <button id="btnBookNow" class="cta-btn">Explore Destinations</button>
        </div>
        <div
            id="recommendationResults"
            class="results-container"
        >

        </div>
    </section>

    <div class="social-sidebar">

        <a href="#">
        <img src="./icons/x.svg" alt="X">
        </a>

        <a href="#">
            <img src="./icons/facebook.svg" alt="Facebook">
        </a>

        <a href="#">
            <img src="./icons/instagram.svg" alt="Instagram">
        </a>

        <a href="#">
            <img src="./icons/youtube.svg" alt="YouTube">
        </a>

    </div>
    <script src="./travel_recommendation.js"></script>
</body>
</html>
