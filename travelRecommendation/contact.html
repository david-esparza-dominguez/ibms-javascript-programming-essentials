<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Travel Wanderly</title>

    <link 
    rel="stylesheet" 
    href="./travel_recommendation.css" 
    />
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            Travel Wanderly
        </div>

        <ul class="nav-links">

            <li>
                <a href="./travel_recommendation.html" id="home">
                    Home
                </a>
            </li>

            <li>
                <a href="./about.html" id="about">
                    About us
                </a>
            </li>

            <li>
                <a href="./contact.html" id="contact">
                    Contact us
                </a>
            </li>

        </ul>

        <div class="search-container">

            <input
                type="text"
                id="travelSearchInput"
                placeholder="Enter a destination or keyword"
            />

            <span class="search-icon">
                🔍
            </span>

            <button id="btnSearch" class="search-btn">
                Search
            </button>

            <button id="btnClear" class="clear-btn">
                Clear
            </button>

        </div>

    </nav>

    <section class="hero">

        <div class="contact-layout">

            <div class="contact-content">

                <h1>CONTACT US</h1>

                <p>
                    Get in touch
                </p>

            </div>

            <div class="contact-form-container">

                <form class="contact-form">

                    <label for="name">
                        Name
                    </label>

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your name"
                    />

                    <label for="email">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                    />

                    <label for="message">
                        Message
                    </label>

                    <textarea
                        id="message"
                        rows="8"
                        placeholder="Enter your message"
                    ></textarea>

                    <button
                        type="submit"
                        class="submit-btn"
                    >
                        Submit
                    </button>

                </form>

            </div>

        </div>

    </section>

    <div class="social-sidebar">

        <a href="#">
            <img src="./icons/x.svg" alt="X">
        </a>

        <a href="#">
            <img src="./icons/facebook.svg" alt="Facebook">
        </a>

        <a href="#">
            <img src="./icons/instagram.svg" alt="Instagram">
        </a>

        <a href="#">
            <img src="./icons/youtube.svg" alt="YouTube">
        </a>

    </div>

</body>
</html>
