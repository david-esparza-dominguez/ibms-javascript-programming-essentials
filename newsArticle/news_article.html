<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News Articles</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .article {
      background-color: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .article h2 {
      color: #0066cc;
      margin-top: 0;
    }
    .article-meta {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 10px;
    }
    .article p {
      color: #333;
      line-height: 1.6;
    }
    .article h3 {
      color: #444;
      margin-top: 15px;
      margin-bottom: 8px;
    }
    .article ul {
      color: #555;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>News Articles</h1>
  <div id="articles"></div>
<script src="./news_article.js"></script>
</body>
</html>
