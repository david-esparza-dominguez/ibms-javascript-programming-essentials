<!DOCTYPE html>
<html lang="en">
<head>
  <title>Weather Report</title>
</head>
<body>
    <h1>Weather Report</h1>

    <form id="weatherForm">
    <h2>City Option</h2>
    <label for="city">Enter City:</label>
    <input type="text" id="city" name="city">
    <button type="submit">Get Weather By City</button>
    </form>

    <hr>

    <form id="weatherFormCoords">
    <h2>Coordinates Option</h2>
    <label for="latitude">Enter Latitude:</label>
    <input type="number" id="latitude" placeholder="e.g. 44.4444" step="0.0001">
    <label for="longitude">Enter Longitude:</label>
    <input type="number" id="longitude" placeholder="e.g. -77.7777" step="0.0001">
    <button type="submit" id="weatherFromCoords">Get Weather By Coordinates</button>
    </form>
    
  <div id="weatherInfo"></div>
<script src="./weather_report.js"></script>
</body>
</html>
